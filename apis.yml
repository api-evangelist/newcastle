---
aid: newcastle
name: Newcastle University
description: >-
  Newcastle University is a public research university in Newcastle upon Tyne,
  United Kingdom, ranked #129 in the QS World University Rankings 2025. Its
  public developer and API footprint centers on research and open-data
  initiatives rather than a single central developer portal. Confirmed public
  APIs include the Newcastle Urban Observatory REST API (one of the UK's largest
  open urban-sensing platforms, with an OpenAPI specification), the Digitised
  Objects Repository Search and Data API, and the ECPPEC electoral history
  research API. The university also operates a verified GitHub organization and
  a Figshare-powered research data repository (data.ncl), and runs EPrints-based
  institutional and thesis repositories that expose OAI-PMH.
